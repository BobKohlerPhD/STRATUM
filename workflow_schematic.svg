<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sophisticated Gradients -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="goldTierGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    
    <!-- Filters for Depth -->
    <filter id="softDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#F8FAFC"/>
  
  <!-- Modern Header -->
  <rect width="1200" height="100" fill="url(#headerGrad)"/>
  <text x="40" y="55" font-family="'Inter', Helvetica, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="-0.5">STRATUM ORCHESTRATION ARCHITECTURE</text>
  <text x="40" y="80" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#94A3B8" letter-spacing="1">FEDERATED MULTI-MODAL DATA HARMONIZATION PROTOCOL v2.6</text>
  <rect x="40" y="90" width="1120" height="1" fill="#334155"/>

  <!-- PHASE I: Orchestration & AI Interaction -->
  <g transform="translate(40, 130)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#64748B" letter-spacing="1">PHASE I: AGENTIC INTERFACE</text>
    <rect x="0" y="15" width="1120" height="130" rx="8" fill="white" filter="url(#softDropShadow)"/>
    
    <!-- User/Researcher -->
    <g transform="translate(30, 45)">
      <circle cx="35" cy="35" r="35" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
      <path d="M35 25c-5 0-10 5-10 10s5 10 10 10 10-5 10-10-5-10-10-10zM20 55c0-4 15-4 15-4s15 0 15 4v3H20v-3z" fill="#64748B"/>
      <text x="85" y="35" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#1E293B">Clinical Researcher</text>
      <text x="85" y="52" font-family="Inter, sans-serif" font-size="11" fill="#64748B">Natural Language Orchestration</text>
    </g>

    <path d="M350 80 H450" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>

    <!-- FastMCP Node -->
    <g transform="translate(500, 40)">
      <rect width="580" height="80" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
      <text x="20" y="35" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#1D4ED8">FastMCP Orchestrator</text>
      <text x="20" y="58" font-family="Inter, sans-serif" font-size="11" fill="#1E40AF">Dynamic Tool Discovery | Pydantic Validation | Async Task Scheduling</text>
    </g>
  </g>

  <!-- PHASE II: Multi-Modal Harmonization -->
  <g transform="translate(40, 310)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#64748B" letter-spacing="1">PHASE II: THE HARMONIZATION ENGINE</text>
    <rect x="0" y="15" width="1120" height="260" rx="8" fill="white" filter="url(#softDropShadow)"/>
    
    <!-- Core Engine -->
    <g transform="translate(40, 45)">
      <rect width="220" height="200" rx="8" fill="#1E293B" filter="url(#glowTeal)"/>
      <text x="110" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="white">STRATUM CORE</text>
      <text x="110" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0EA5E9">Zero-Trust Processing</text>
      <line x1="40" y1="140" x2="180" y2="140" stroke="#334155" stroke-width="1"/>
      <text x="110" y="165" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#94A3B8">Synthetic Twin Gen.</text>
    </g>

    <!-- Plugin Grid -->
    <g transform="translate(300, 45)">
      <g transform="translate(0, 0)">
        <rect width="240" height="90" rx="4" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="15" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1E293B">Neuroimaging (BIDS)</text>
        <text x="15" y="70" font-family="Inter, sans-serif" font-size="10" fill="#64748B">Nibabel Converter | BOLD Signals</text>
      </g>
      <g transform="translate(260, 0)">
        <rect width="240" height="90" rx="4" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="15" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1E293B">Multi-Omics</text>
        <text x="15" y="70" font-family="Inter, sans-serif" font-size="10" fill="#64748B">VCF Genomic | MS Proteomics</text>
      </g>
      <g transform="translate(520, 0)">
        <rect width="240" height="90" rx="4" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="15" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1E293B">Digital Biomarkers</text>
        <text x="15" y="70" font-family="Inter, sans-serif" font-size="10" fill="#64748B">Actigraphy | IoT Time-Series</text>
      </g>
      <!-- Governance -->
      <g transform="translate(0, 110)">
        <rect width="760" height="90" rx="4" fill="#F1F5F9" stroke="#1E293B" stroke-dasharray="2,2"/>
        <text x="380" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#1E293B">Master Clinical Registry (MCR) Governance</text>
        <text x="380" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#475569">Zero-Trust Schema Enforcement | Semantic Interoperability</text>
      </g>
    </g>
  </g>

  <!-- PHASE III: Medallion Architecture & Persistence -->
  <g transform="translate(40, 620)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#64748B" letter-spacing="1">PHASE III: DATA PERSISTENCE &amp; PROVENANCE</text>
    <rect x="0" y="15" width="1120" height="240" rx="8" fill="white" filter="url(#softDropShadow)"/>
    
    <!-- Bronze Tier -->
    <g transform="translate(30, 45)">
      <rect width="320" height="180" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
      <rect width="320" height="30" rx="6" fill="#94A3B8"/>
      <text x="160" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="900" fill="white">BRONZE (SOURCE)</text>
      <text x="20" y="65" font-family="Inter, sans-serif" font-size="11" fill="#1E293B">■ Raw NIfTI &amp; DICOM Ingestion</text>
      <text x="20" y="85" font-family="Inter, sans-serif" font-size="11" fill="#1E293B">■ Federated Multi-Modal CSV/JSON</text>
      <!-- Synthetic Indicator -->
      <g transform="translate(20, 110)">
        <rect width="280" height="50" rx="4" fill="white" stroke="#6366F1" stroke-width="1" stroke-dasharray="2,2"/>
        <text x="140" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#6366F1">Synthetic Twin Source</text>
        <text x="140" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#4338CA">Enabling Cold-Start &amp; Privacy-First Dev</text>
      </g>
    </g>

    <path d="M350 135 H400" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Silver Tier -->
    <g transform="translate(400, 45)">
      <rect width="320" height="180" rx="6" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
      <rect width="320" height="30" rx="6" fill="#0EA5E9"/>
      <text x="160" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="900" fill="white">SILVER (HARMONIZED)</text>
      <text x="20" y="65" font-family="Inter, sans-serif" font-size="11" fill="#1E293B">■ Unified Feature Extraction (BOLD/HRV)</text>
      <text x="20" y="85" font-family="Inter, sans-serif" font-size="11" fill="#1E293B">■ Columnar Parquet/RDS Storage</text>
      <rect x="20" y="140" width="280" height="25" rx="4" fill="#BAE6FD" opacity="0.3"/>
      <text x="150" y="157" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#0EA5E9">VALIDATED ASSETS</text>
    </g>

    <path d="M720 135 H770" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Gold Tier -->
    <g transform="translate(770, 45)">
      <rect width="320" height="180" rx="6" fill="#FFFBEB" stroke="url(#goldTierGrad)" stroke-width="2"/>
      <rect width="320" height="30" rx="6" fill="url(#goldTierGrad)"/>
      <text x="160" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="900" fill="white">GOLD (ANALYTICS)</text>
      <text x="20" y="65" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#854D0E">LONGITUDINAL COHORT JOIN</text>
      <text x="20" y="85" font-family="Inter, sans-serif" font-size="11" fill="#854D0E">■ W3C-PROV Provenance Hashing</text>
      <text x="160" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#B45309">PUBLICATION READY</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="600" y="885" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Engineered for clinical precision and semantic interoperability. | Multi-modal orchestration via FastMCP.</text>
</svg>
